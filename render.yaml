services:
  - type: worker
    name: santo-discord-bot
    runtime: node
    region: oregon
    plan: starter
    buildCommand: "npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter @workspace/discord-bot run build"
    startCommand: "node artifacts/discord-bot/dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DISCORD_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
